[build]
  command = "rm -rf netlify/functions/database netlify/functions/commands netlify/functions/functions && cp -r database netlify/functions/ && cp -r commands netlify/functions/ && cp -r functions netlify/functions/ && cp config.py netlify/functions/ && cp requirements.txt netlify/functions/"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/.netlify/functions/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true
