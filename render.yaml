services:
  - type: web
    name: telegram-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_IDS
        sync: false
